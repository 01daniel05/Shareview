# ============================================
# PRODUCTION EMAIL CONFIG (SendGrid)
# ============================================

# SendGrid SMTP - THESE ARE THE CORRECT SETTINGS
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY}
spring.mail.from=shareview682@gmail.com

# SMTP Properties
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

# Enable mail debug temporarily
spring.mail.properties.mail.debug=true

# ============================================
# DATABASE & SERVER CONFIG
# ============================================
server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATABASE_URL}
spring.datasource.username=${SPRING_DATABASE_USERNAME}
spring.datasource.password=${SPRING_DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

# ============================================
# LOGGING - ADD EMAIL DEBUGGING
# ============================================
logging.level.org.springframework.mail=DEBUG
logging.level.com.sun.mail=DEBUG
logging.level.Shareview.service.EmailService=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Application Configuration
app.otp.expiration.minutes=5
app.max.saved.posts=50

# File upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=2MB

# Static resource serving
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:./uploads/

# Jackson configuration
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

# Cloudinary configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true
management.health.mail.enabled=true

