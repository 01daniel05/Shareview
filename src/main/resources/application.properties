# ============================================
# SENDGRID WEB API CONFIGURATION
# ============================================
# SendGrid API Key (will be injected via environment variable)
sendgrid.api-key=${SENDGRID_API_KEY}

# From email address
app.email.from=shareview682@gmail.com
app.email.sender-name=Shareview

# ============================================
# DATABASE & SERVER CONFIG
# ============================================
server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

# ============================================
# LOGGING - INCREASE FOR DEBUGGING
# ============================================
logging.level.Shareview.service.SendGridEmailService=DEBUG
logging.level.Shareview.service.EmailService=DEBUG
logging.level.com.sendgrid=DEBUG

# ============================================
# APPLICATION CONFIG
# ============================================
app.otp.expiration.minutes=5
app.max.saved.posts=50

# File upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=2MB

# Static resource serving
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:./uploads/

# Jackson configuration
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

# Cloudinary configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

# Disable Spring Mail auto-configuration since we're using SendGrid Web API
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration